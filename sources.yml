# sources.yml -- Data provenance metadata
# Reference: docs/mcp-infrastructure-blueprint.md

schema_version: "1.0"
mcp_name: "Norwegian Financial Regulation MCP"
category: "domain_intelligence"
jurisdiction: "Norway"

sources:
  - name: "Finanstilsynet (Norwegian Financial Supervisory Authority)"
    authority: "Finanstilsynet"
    official_url: "https://www.finanstilsynet.no/"
    retrieval_method: "API_FETCH"
    api_endpoint: "https://www.finanstilsynet.no/api/search/nyhetsarkiv"
    format: "JSON + HTML"
    authentication: "none"
    update_frequency: "quarterly"
    license:
      type: "Public Domain (Norwegian government publications)"
      url: "https://www.finanstilsynet.no/"
      summary: "Norwegian regulatory publications are freely available"
    coverage:
      scope: "Rundskriv (circulars), veiledninger (guidance), and enforcement actions"
      item_count: 285
    languages:
      - "no"

  - name: "Lovdata (Norwegian Legal Information System)"
    authority: "Lovdata"
    official_url: "https://lovdata.no"
    retrieval_method: "HTML_SCRAPE"
    format: "HTML"
    authentication: "none"
    update_frequency: "quarterly"
    license:
      type: "Public Domain (Norwegian legislation)"
      url: "https://lovdata.no"
      summary: "Norwegian legislation and regulations are public records"
    coverage:
      scope: "Key financial forskrifter (CRR/CRD, AML, insurance, securities)"
      item_count: 7
    languages:
      - "no"
